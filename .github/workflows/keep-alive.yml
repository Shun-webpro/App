name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * 3'  # 毎週水曜 00:00 UTC（7日以内に必ず実行）
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
